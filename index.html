<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexarise Taaver — CPM Gantt Chart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@700;800&display=swap');

:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface2: #1a2236;
  --border: #1e293b;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #475569;
  --critical: #ef4444;
  --critical-glow: rgba(239,68,68,0.25);
  --noncritical: #22d3ee;
  --noncritical-dim: rgba(34,211,238,0.15);
  --gold: #f59e0b;
  --gold-dim: rgba(245,158,11,0.15);
  --accent: #8b5cf6;
  --green: #10b981;
  --header-h: 48px;
  --row-h: 32px;
  --label-w: 320px;
  --day-w: 3px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* ========== TOP BAR ========== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-wrap: wrap;
  z-index: 100;
  position: relative;
}
.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--gold);
  white-space: nowrap;
}
.topbar-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* Stats chips */
.stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 12px;
  white-space: nowrap;
}
.stat b { color: var(--gold); font-weight: 700; }
.stat .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.dot-crit { background: var(--critical); box-shadow: 0 0 6px var(--critical-glow); }
.dot-nc { background: var(--noncritical); }

/* Filters */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--gold); color: var(--text); }
.filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 700; }
.filter-btn.crit-filter.active { background: var(--critical); border-color: var(--critical); color: #fff; }

/* ========== MAIN GANTT AREA ========== */
.gantt-wrapper {
  display: flex;
  height: calc(100vh - 100px);
  overflow: hidden;
}

/* Left panel - task labels */
.label-panel {
  width: var(--label-w);
  min-width: var(--label-w);
  overflow-y: auto;
  overflow-x: hidden;
  border-right: 1px solid var(--border);
  background: var(--surface);
  scrollbar-width: none;
}
.label-panel::-webkit-scrollbar { display: none; }

.label-header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  position: sticky;
  top: 0;
  z-index: 10;
  gap: 8px;
}
.label-header span:first-child { width: 34px; text-align: center; }
.label-header span:nth-child(2) { flex: 1; }
.label-header span:nth-child(3) { width: 36px; text-align: center; }
.label-header span:nth-child(4) { width: 42px; text-align: center; }

.label-row {
  height: var(--row-h);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  border-bottom: 1px solid rgba(30,41,59,0.5);
  cursor: pointer;
  transition: background 0.15s;
  gap: 8px;
}
.label-row:hover { background: var(--surface2); }
.label-row.critical-row { border-left: 3px solid var(--critical); }
.label-row.nc-row { border-left: 3px solid transparent; }

.label-row .tid {
  width: 34px;
  text-align: center;
  font-weight: 700;
  font-size: 10px;
  color: var(--text-dim);
}
.label-row.critical-row .tid { color: var(--critical); }

.label-row .tname {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.label-row.critical-row .tname { color: #fca5a5; font-weight: 500; }

.label-row .tdur {
  width: 36px;
  text-align: center;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
}
.label-row .tfloat {
  width: 42px;
  text-align: center;
  font-size: 10px;
  font-weight: 500;
}
.label-row.critical-row .tfloat { color: var(--critical); }
.label-row.nc-row .tfloat { color: var(--noncritical); }

/* Phase group header */
.phase-group {
  height: var(--row-h);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--gold);
  background: var(--gold-dim);
  border-bottom: 1px solid var(--border);
  position: sticky;
  cursor: pointer;
}

/* Right panel - bars */
.chart-panel {
  flex: 1;
  overflow: auto;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--border) var(--bg);
}

.chart-header {
  height: var(--header-h);
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
}

.month-label {
  position: absolute;
  top: 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}
.day-label {
  position: absolute;
  bottom: 4px;
  font-size: 8px;
  color: var(--text-dim);
}

.chart-body {
  position: relative;
}

.chart-row {
  height: var(--row-h);
  position: relative;
  border-bottom: 1px solid rgba(30,41,59,0.3);
}
.chart-row:hover { background: rgba(30,41,59,0.3); }

/* Bars */
.bar {
  position: absolute;
  top: 6px;
  height: 20px;
  border-radius: 3px;
  cursor: pointer;
  transition: filter 0.15s, transform 0.15s;
  z-index: 2;
}
.bar:hover { filter: brightness(1.3); transform: scaleY(1.15); z-index: 5; }

.bar-critical {
  background: linear-gradient(135deg, #dc2626, #ef4444);
  box-shadow: 0 0 8px var(--critical-glow);
}
.bar-noncritical {
  background: linear-gradient(135deg, #0891b2, #22d3ee);
  opacity: 0.7;
}

/* Float bar (slack) */
.bar-float {
  position: absolute;
  top: 12px;
  height: 8px;
  border-radius: 2px;
  background: repeating-linear-gradient(90deg, rgba(34,211,238,0.15) 0, rgba(34,211,238,0.15) 4px, transparent 4px, transparent 8px);
  z-index: 1;
  pointer-events: none;
}

/* Grid lines */
.grid-line {
  position: absolute;
  top: 0;
  width: 1px;
  height: 100%;
  background: var(--border);
  opacity: 0.4;
  z-index: 0;
}
.grid-line.major { opacity: 0.7; }

/* Tooltip */
.tooltip {
  position: fixed;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 340px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
.tooltip .tt-crit { color: var(--critical); }
.tooltip .tt-nc { color: var(--noncritical); }
.tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; }
.tooltip .tt-label { color: var(--text-muted); }
.tooltip .tt-val { font-weight: 500; }
.tooltip .tt-phase {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 6px;
}

/* Phase chart header rows */
.chart-phase-row {
  height: var(--row-h);
  background: var(--gold-dim);
  border-bottom: 1px solid var(--border);
}

/* Today marker */
.today-line {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: var(--gold);
  z-index: 3;
  opacity: 0.6;
}

/* Search */
.search-box {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  width: 160px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--gold); }
.search-box::placeholder { color: var(--text-dim); }

/* Zoom controls */
.zoom-controls {
  display: flex;
  gap: 4px;
  align-items: center;
}
.zoom-btn {
  width: 28px; height: 28px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  transition: all 0.2s;
}
.zoom-btn:hover { background: var(--surface2); border-color: var(--gold); }
.zoom-level { font-size: 10px; color: var(--text-muted); min-width: 30px; text-align: center; }
</style>
</head>

 46, "ls": 465, "lf": 470, "tf": 424, "ff": 424, "critical": false, "phase": "Landscaping+"}, {"id": 151, "name": "CCTV backbone", "duration": 8, "predecessors": "77", "es": 353, "ef": 361, "ls": 486, "lf": 494, "tf": 133, "ff": 0, "critical": false, "phase": "Security"}, {"id": 152, "name": "Site handover", "duration": 1, "predecessors": "149", "es": 400, "ef": 401, "ls": 505, "lf": 506, "tf": 105, "ff": 105, "critical": false, "phase": "Security"}, {"id": 153, "name": "BMS commissioning", "duration": 6, "predecessors": "120", "es": 393, "ef": 399, "ls": 496, "lf": 502, "tf": 103, "ff": 103, "critical": false, "phase": "Smart Building"}, {"id": 154, "name": "Perimeter fencing", "duration": 8, "predecessors": "8", "es": 44, "ef": 52, "ls": 462, "lf": 470, "tf": 418, "ff": 418, "critical": false, "phase": "Security"}, {"id": 155, "name": "Security handover final", "duration": 5, "predecessors": "152", "es": 401, "ef": 406, "ls": 506, "lf": 511, "tf": 105, "ff": 105, "critical": false, "phase": "Security"}];

// ===== CONFIG =====
let DAY_W = 3;
const ROW_H = 32;
const HEADER_H = 48;
const TOTAL_DAYS = 522;

// Phase ordering
const PHASE_ORDER = [
  'Planning','Site Work','Earthwork','Foundation','Drainage',
  'GF','F1','F2','F3','F4','F5','F6',
  'Roofing','Staircase','Doors & Windows','Plumbing','HVAC',
  'Interior Finishing','Electrical','Exterior Finishing','Final Acceptance',
  'Fire Protection','Smart Building','Safety','Green',
  'MEP Coordination','Landscaping+','Security'
];

const PHASE_COLORS = {
  'Planning':'#f59e0b','Site Work':'#f97316','Earthwork':'#a16207',
  'Foundation':'#78716c','Drainage':'#0ea5e9','GF':'#6366f1','F1':'#7c3aed',
  'F2':'#8b5cf6','F3':'#a78bfa','F4':'#c084fc','F5':'#d8b4fe','F6':'#e9d5ff',
  'Roofing':'#ec4899','Staircase':'#f43f5e','Doors & Windows':'#14b8a6',
  'Plumbing':'#06b6d4','HVAC':'#22d3ee','Interior Finishing':'#f59e0b',
  'Electrical':'#eab308','Exterior Finishing':'#84cc16',
  'Final Acceptance':'#10b981',
  'Fire Protection':'#ef4444','Smart Building':'#3b82f6',
  'Safety':'#fbbf24','Green':'#22c55e',
  'MEP Coordination':'#06b6d4','Landscaping+':'#34d399','Security':'#f97316'
};

// ===== STATE =====
let activeFilter = 'all';
let critOnly = false;
let searchTerm = '';

// ===== GROUP TASKS BY PHASE =====
function getGroupedTasks() {
  let filtered = TASKS.filter(t => {
    if (critOnly && !t.critical) return false;
    if (activeFilter !== 'all' && t.phase !== activeFilter) return false;
    if (searchTerm && !t.name.toLowerCase().includes(searchTerm) && !String(t.id).includes(searchTerm)) return false;
    return true;
  });

  // Group by phase
  const groups = {};
  for (const t of filtered) {
    if (!groups[t.phase]) groups[t.phase] = [];
    groups[t.phase].push(t);
  }

  // Order by PHASE_ORDER
  const ordered = [];
  for (const ph of PHASE_ORDER) {
    if (groups[ph]) {
      ordered.push({ phase: ph, tasks: groups[ph].sort((a,b) => a.es - b.es || a.id - b.id) });
    }
  }
  return ordered;
}

// ===== RENDER =====
function render() {
  const groups = getGroupedTasks();
  const labelBody = document.getElementById('labelBody');
  const chartBody = document.getElementById('chartBody');
  const chartHeader = document.getElementById('chartHeader');

  // Clear
  labelBody.innerHTML = '';
  chartBody.innerHTML = '';
  chartHeader.innerHTML = '';

  const chartW = TOTAL_DAYS * DAY_W;

  // Render header timeline
  chartHeader.style.width = chartW + 'px';
  chartHeader.style.position = 'sticky';
  chartHeader.style.top = '0';

  // Month markers (30-day months)
  for (let m = 0; m <= 18; m++) {
    const day = m * 30;
    if (day > TOTAL_DAYS) break;
    const ml = document.createElement('span');
    ml.className = 'month-label';
    ml.style.left = (day * DAY_W) + 'px';
    ml.textContent = 'M' + m;
    chartHeader.appendChild(ml);
  }

  // Day markers every 50 days
  for (let d = 0; d <= TOTAL_DAYS; d += 50) {
    const dl = document.createElement('span');
    dl.className = 'day-label';
    dl.style.left = (d * DAY_W) + 'px';
    dl.textContent = d;
    chartHeader.appendChild(dl);
  }

  // Build rows
  let rowIndex = 0;
  for (const grp of groups) {
    // Phase header
    const phLabel = document.createElement('div');
    phLabel.className = 'phase-group';
    phLabel.textContent = grp.phase + ' (' + grp.tasks.length + ')';
    labelBody.appendChild(phLabel);

    const phChart = document.createElement('div');
    phChart.className = 'chart-phase-row';
    phChart.style.width = chartW + 'px';
    chartBody.appendChild(phChart);

    // Tasks
    for (const t of grp.tasks) {
      // Label row
      const lr = document.createElement('div');
      lr.className = 'label-row ' + (t.critical ? 'critical-row' : 'nc-row');
      lr.innerHTML = `
        <span class="tid">${t.id}</span>
        <span class="tname" title="${t.name}">${t.name}</span>
        <span class="tdur">${t.duration}d</span>
        <span class="tfloat">${t.tf}</span>
      `;
      labelBody.appendChild(lr);

      // Chart row
      const cr = document.createElement('div');
      cr.className = 'chart-row';
      cr.style.width = chartW + 'px';

      // Main bar
      const bar = document.createElement('div');
      bar.className = 'bar ' + (t.critical ? 'bar-critical' : 'bar-noncritical');
      bar.style.left = (t.es * DAY_W) + 'px';
      bar.style.width = Math.max(t.duration * DAY_W, 2) + 'px';

      // Tooltip
      bar.addEventListener('mouseenter', (e) => showTooltip(e, t));
      bar.addEventListener('mousemove', (e) => moveTooltip(e));
      bar.addEventListener('mouseleave', hideTooltip);
      lr.addEventListener('mouseenter', (e) => { showTooltip(e, t); lr.style.background = 'var(--surface2)'; });
      lr.addEventListener('mouseleave', (e) => { hideTooltip(); lr.style.background = ''; });

      cr.appendChild(bar);

      // Float bar
      if (t.tf > 0) {
        const fb = document.createElement('div');
        fb.className = 'bar-float';
        fb.style.left = (t.ef * DAY_W) + 'px';
        fb.style.width = (t.tf * DAY_W) + 'px';
        cr.appendChild(fb);
      }

      chartBody.appendChild(cr);
      rowIndex++;
    }
  }

  // Grid lines every 50 days
  for (let d = 0; d <= TOTAL_DAYS; d += 50) {
    const gl = document.createElement('div');
    gl.className = 'grid-line' + (d % 100 === 0 ? ' major' : '');
    gl.style.left = (d * DAY_W) + 'px';
    gl.style.height = chartBody.scrollHeight + 'px';
    chartBody.appendChild(gl);
  }
}

// ===== TOOLTIP =====
const tooltip = document.getElementById('tooltip');

function showTooltip(e, t) {
  const phColor = PHASE_COLORS[t.phase] || '#64748b';
  tooltip.innerHTML = `
    <div class="tt-title ${t.critical ? 'tt-crit' : 'tt-nc'}">#${t.id} — ${t.name}</div>
    <div class="tt-row"><span class="tt-label">Duration</span><span class="tt-val">${t.duration} days</span></div>
    <div class="tt-row"><span class="tt-label">Early Start → Finish</span><span class="tt-val">Day ${t.es} → ${t.ef}</span></div>
    <div class="tt-row"><span class="tt-label">Late Start → Finish</span><span class="tt-val">Day ${t.ls} → ${t.lf}</span></div>
    <div class="tt-row"><span class="tt-label">Total Float</span><span class="tt-val" style="color:${t.tf === 0 ? 'var(--critical)' : 'var(--noncritical)'}">${t.tf} days</span></div>
    <div class="tt-row"><span class="tt-label">Free Float</span><span class="tt-val">${t.ff} days</span></div>
    <div class="tt-row"><span class="tt-label">Predecessors</span><span class="tt-val">${t.predecessors}</span></div>
    <div class="tt-row"><span class="tt-label">Critical?</span><span class="tt-val" style="color:${t.critical ? 'var(--critical)' : 'var(--noncritical)'}">${t.critical ? '★ YES' : 'No'}</span></div>
    <span class="tt-phase" style="background:${phColor}22;color:${phColor};border:1px solid ${phColor}44">${t.phase}</span>
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  let x = e.clientX + 16, y = e.clientY + 12;
  if (x + 350 > window.innerWidth) x = e.clientX - 360;
  if (y + 250 > window.innerHeight) y = e.clientY - 250;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }

// ===== SYNC SCROLL =====
const labelPanel = document.getElementById('labelPanel');
const chartPanel = document.getElementById('chartPanel');
chartPanel.addEventListener('scroll', () => { labelPanel.scrollTop = chartPanel.scrollTop; });
labelPanel.addEventListener('scroll', () => { chartPanel.scrollTop = labelPanel.scrollTop; });

// ===== FILTERS =====
function buildFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';

  // Critical only toggle
  const critBtn = document.createElement('button');
  critBtn.className = 'filter-btn crit-filter' + (critOnly ? ' active' : '');
  critBtn.textContent = '★ Critical';
  critBtn.onclick = () => { critOnly = !critOnly; buildFilters(); render(); };
  bar.appendChild(critBtn);

  // All
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (activeFilter === 'all' ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => { activeFilter = 'all'; buildFilters(); render(); };
  bar.appendChild(allBtn);

  // Phase buttons - only show main groups to avoid clutter
  const mainPhases = ['Planning','Site Work','Earthwork','Foundation','Drainage',
    'GF','F1','F2','F3','F4','F5','F6','Roofing','Staircase','Doors & Windows',
    'Plumbing','HVAC','Interior Finishing','Electrical','Exterior Finishing','Final Acceptance',
    'Fire Protection','Smart Building','Safety','Green','MEP Coordination','Landscaping+','Security'];

  for (const ph of mainPhases) {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === ph ? ' active' : '');
    btn.textContent = ph;
    btn.style.borderColor = PHASE_COLORS[ph] || 'var(--border)';
    if (activeFilter === ph) btn.style.background = PHASE_COLORS[ph];
    btn.onclick = () => { activeFilter = ph; buildFilters(); render(); };
    bar.appendChild(btn);
  }
}

// ===== SEARCH =====
document.getElementById('searchBox').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  render();
});

// ===== ZOOM =====
document.getElementById('zoomIn').addEventListener('click', () => {
  DAY_W = Math.min(DAY_W + 1, 12);
  document.getElementById('zoomLevel').textContent = DAY_W + 'px';
  render();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  DAY_W = Math.max(DAY_W - 1, 1);
  document.getElementById('zoomLevel').textContent = DAY_W + 'px';
  render();
});

// ===== INIT =====
buildFilters();
render();
</script>
