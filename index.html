function getBarColor(t){
  if(t.phase==='Interior Finishing'&&(t.id===95||t.id===96)) return t.cp?'#185FA5':'#E24B4A';
  if(t.phase==='Exterior Finishing'&&t.id===105) return '#1D9E75';
  return t.cp ? (phaseColors[t.phase]||'#185FA5') : (phaseColorNonCP[t.phase]||'#1D9E75');
}

function getVisibleTasks(){
  return tasks.filter(t=>{
    if(cpOnly&&!t.cp) return false;
    if(currentFilter==='all') return true;
    return t.phase===currentFilter;
  });
}

function drawHeader(barsW){
  const canvas=document.getElementById('ganttCanvas');
  canvas.width=barsW; canvas.height=22;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,barsW,22);
  const months=18;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const textColor=isDark?'#888780':'#888780';
  const lineColor=isDark?'rgba(180,178,169,.2)':'rgba(136,135,128,.2)';
  for(let m=0;m<=months;m++){
    const x=Math.round((m/months)*barsW*(TOTAL/TOTAL));
    const xp=Math.round((m*TOTAL/months)/TOTAL*barsW);
    ctx.beginPath();ctx.strokeStyle=lineColor;ctx.lineWidth=.5;
    ctx.moveTo(xp,0);ctx.lineTo(xp,22);ctx.stroke();
    if(m<months){
      ctx.fillStyle=textColor;ctx.font='10px var(--font-sans,sans-serif)';
      ctx.fillText('M'+(m+1),xp+3,14);
    }
  }
}

function renderBarsCell(t,barsW){
  const canvas=document.createElement('canvas');
  canvas.width=barsW; canvas.height=ROW_H;
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,barsW,ROW_H);
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gridColor=isDark?'rgba(180,178,169,.12)':'rgba(136,135,128,.12)';
  for(let m=0;m<=18;m++){
    const xp=Math.round((m*TOTAL/18)/TOTAL*barsW);
    ctx.beginPath();ctx.strokeStyle=gridColor;ctx.lineWidth=.5;
    ctx.moveTo(xp,0);ctx.lineTo(xp,ROW_H);ctx.stroke();
  }
  const x=Math.round(t.es/TOTAL*barsW);
  const w=Math.max(2,Math.round(t.dur/TOTAL*barsW));
  const y=Math.round((ROW_H-BAR_H)/2);
  ctx.fillStyle=getBarColor(t);
  ctx.beginPath();
  const r=2;
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+BAR_H-r);ctx.arcTo(x+w,y+BAR_H,x+w-r,y+BAR_H,r);
  ctx.lineTo(x+r,y+BAR_H);ctx.arcTo(x,y+BAR_H,x,y+BAR_H-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();ctx.fill();
  if(t.cp){
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+2,y+2);ctx.lineTo(x+w-2,y+2);ctx.stroke();
  }
  canvas.addEventListener('mousemove',e=>{
    const tt=document.getElementById('tooltip');
    tt.style.display='block';
    tt.style.left=(e.clientX+12)+'px';
    tt.style.top=(e.clientY-10)+'px';
    tt.innerHTML=`<strong>Task ${t.id}: ${t.name}</strong><br>Phase: ${t.phase}<br>Duration: ${t.dur} days (Day ${t.es}–${t.ef})<br>Critical path: ${t.cp?'Yes':'No'}<br>Cost: ${formatCost(t.cost)}`;
  });
  canvas.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none'});
  return canvas;
}

function render(){
  const visible=getVisibleTasks();
  const tbody=document.getElementById('gc-body');
  tbody.innerHTML='';
  const barsW=Math.max(400, document.getElementById('bars-header').offsetWidth||520);
  drawHeader(barsW);
  let lastPhase='';
  visible.forEach(t=>{
    const tr=document.createElement('tr');
    if(t.phase!==lastPhase&&lastPhase!=='') tr.classList.add('phase-sep');
    lastPhase=t.phase;
    const tdId=document.createElement('td');
    tdId.textContent=t.id;
    tdId.style.fontSize='11px';tdId.style.color='var(--color-text-secondary)';
    const tdName=document.createElement('td');
    const nameDiv=document.createElement('div');
    nameDiv.className='task-name';nameDiv.title=t.name;nameDiv.textContent=t.name;
    tdName.appendChild(nameDiv);
    const tdPhase=document.createElement('td');
    const badge=document.createElement('span');
    badge.className='ph-label';
    badge.style.background=phaseLabel[t.phase]||'#F1EFE8';
    badge.style.color=phaseLabelText[t.phase]||'#444441';
    badge.textContent=t.phase;
    tdPhase.appendChild(badge);
    const tdDur=document.createElement('td');
    tdDur.className='dur-cell';tdDur.style.textAlign='center';tdDur.textContent=t.dur;
    const tdCp=document.createElement('td');
    tdCp.style.textAlign='center';
    if(t.cp){const s=document.createElement('span');s.className='badge-cp';s.textContent='★';tdCp.appendChild(s);}
    const tdBars=document.createElement('td');
    tdBars.appendChild(renderBarsCell(t,barsW));
    tr.append(tdId,tdName,tdPhase,tdDur,tdCp,tdBars);
    tbody.appendChild(tr);
  });
}

function filterPhase(ph){
  cpOnly=false;
  currentFilter=ph;
  document.querySelectorAll('.gc-controls button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+(ph==='all'?'all':ph));
  if(btn) btn.classList.add('active');
  render();
}

function filterCP(){
  cpOnly=!cpOnly;
  currentFilter='all';
  document.querySelectorAll('.gc-controls button').forEach(b=>b.classList.remove('active'));
  if(cpOnly) document.getElementById('btn-cp').classList.add('active');
  else document.getElementById('btn-all').classList.add('active');
  render();
}

window.addEventListener('resize',render);
render();
</script>
